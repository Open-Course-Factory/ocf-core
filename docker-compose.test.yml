services:
  postgres-test:
    image: postgres:16
    environment:
      POSTGRES_DB: ocf_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 15

  casdoor-db-test:
    image: mysql:8.0.25
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: casdoor
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 2s
      timeout: 2s
      retries: 30

  casdoor-test:
    build:
      context: .
      dockerfile: Dockerfile.casdoor
      args:
        CONFIG_FILE: src/configuration/casdoor_app_test.conf
    depends_on:
      casdoor-db-test:
        condition: service_healthy
    restart: on-failure:5
    environment:
      RUNNING_IN_DOCKER: "true"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/api/get-account"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 15s
