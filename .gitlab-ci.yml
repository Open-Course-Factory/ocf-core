default:
  tags:
    - ocf-core

# ============================================================================
# Variables
# ============================================================================

variables:
  # Build configuration
  GO_VERSION: "1.24"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  GOPROXY: "https://proxy.golang.org,direct"

  # PostgreSQL configuration (shared across test jobs)
  POSTGRES_DB: ocf_test
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: "postgrespass"
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_SSLMODE: disable

# ============================================================================
# Stages
# ============================================================================

stages:
  - prepare  # Build CI images (only when Dockerfiles change)
  - test     # All test suites (unit, integration, race, auth) — MUST pass before tagging
  - check    # Version validation and auto-tagging (only after tests pass)
  - build    # Docker image creation on release tags
  - release  # Release creation

# ============================================================================
# Base Job Templates
# ============================================================================

.test_job_base:
  stage: test
  image: golang:${GO_VERSION}
  before_script:
    - export GOPATH=$CI_PROJECT_DIR/.go
    - export GOCACHE=$CI_PROJECT_DIR/.go/cache
    - export PATH=$PATH:$GOPATH/bin
    - go mod download
    - go install github.com/jstemmer/go-junit-report/v2@latest
    - go install github.com/swaggo/swag/cmd/swag@latest
    - swag init --parseDependency --parseInternal --quiet
  artifacts:
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"  # Manual trigger
  needs: []  # Run in parallel with other test jobs

# NOTE: .postgres_test_base removed — unit tests use in-memory SQLite.
# PostgreSQL is only needed for integration tests (test:auth job with Docker-in-Docker).

# ============================================================================
# Release Component
# ============================================================================

include:
  - component: usine.solution-libre.fr/gitlab/components/release/default@0.3.2
    inputs:
      # Enable all new features
      enable_version_check: true
      enable_docker_build: true
      enable_enhanced_release_notes: true

      # Configure stages to match our pipeline
      check_stage: check
      build_stage: build
      stage: release

      # Version management
      version_file: "VERSION"
      main_branch: "main"
      tag_prefix: "v"

      # Docker build
      dockerfile_path: "Dockerfile"
      build_context: "."

      # Disable old changelog component (using enhanced notes instead)
      disable_changelog: true

# ============================================================================
# Prepare Stage — build CI images when their Dockerfiles change
# ============================================================================

build:ci-auth-image:
  stage: prepare
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    CI_AUTH_IMAGE: ${CI_REGISTRY_IMAGE}/ci-auth:latest
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -f Dockerfile.ci-auth -t $CI_AUTH_IMAGE .
    - docker push $CI_AUTH_IMAGE
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - Dockerfile.ci-auth
    - if: $CI_PIPELINE_SOURCE == "web"
      changes:
        - Dockerfile.ci-auth

# ============================================================================
# Test Stage
# ============================================================================

# All unit tests in a single job: coverage + short mode
# Runs every test in tests/ and src/ except those behind //go:build integration
# No external services required (uses in-memory SQLite)
test:unit:
  extends: .test_job_base
  script:
    - echo "🧪 Running all unit tests with coverage..."
    - go test -v -short -coverprofile=coverage.out -timeout=120s ./tests/... ./src/... 2>&1 | tee tests.log
    - cat tests.log | go-junit-report -set-exit-code > report.xml

  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'

  artifacts:
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.out
    paths:
      - coverage.out
      - report.xml
      - tests.log
    expire_in: 1 week

# Integration tests for Casdoor authentication flow
# Requires: PostgreSQL (app DB), MySQL (Casdoor DB), Casdoor service
# Uses Docker-in-Docker to run all services in isolated network
# Only runs tests with //go:build integration tag
test:auth:
  stage: test
  # Custom image with Go + tools pre-installed (see Dockerfile.ci-auth).
  # Auto-built by build:ci-auth-image job when Dockerfile.ci-auth changes.
  image: ${CI_REGISTRY_IMAGE}/ci-auth:latest
  needs:
    - job: build:ci-auth-image
      optional: true  # Skip dependency when Dockerfile.ci-auth hasn't changed

  services:
    - docker:27-dind

  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: "/certs"
    # Unique project name per job to avoid container name collisions
    # when multiple MR pipelines run in parallel on the same runner
    COMPOSE_PROJECT: "ocf-test-${CI_JOB_ID}"
    # PostgreSQL connection via docker network (service name, resolved by compose DNS)
    POSTGRES_DB: ocf_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: "postgres"
    POSTGRES_HOST: postgres-test
    POSTGRES_PORT: "5432"
    POSTGRES_SSLMODE: disable
    # Casdoor connection (service name, resolved by compose DNS)
    CASDOOR_ENDPOINT: "http://casdoor-test:8000"

  before_script:
    # Create JWT certificate from GitLab CI variable (use test certificate for auth tests)
    - echo $token_jwt_key_test | base64 -d > ./src/auth/casdoor/token_jwt_key.pem

    # Clean up previous run's resources to ensure a fresh start
    - echo "🧹 Cleaning up old Docker resources..."
    - docker compose -p $COMPOSE_PROJECT -f docker-compose.test.yml down -v --remove-orphans || true

    # Start all services at once — compose handles ordering via depends_on + healthchecks
    - echo "🐳 Starting all services (compose handles dependency ordering)..."
    - docker compose -p $COMPOSE_PROJECT -f docker-compose.test.yml up -d --wait --wait-timeout 120

    - echo "🎉 All services are ready!"

    # Download Go modules (host side, for go-junit-report)
    - go mod download

  script:
    - echo "🔐 Running auth integration tests..."
    # Run tests inside the compose network to access services by service name
    # Fixed volume names (not per-job) so Go module cache persists across CI runs
    - |
      docker run --rm \
        --network ${COMPOSE_PROJECT}_default \
        -v $(pwd):/workspace \
        -v ocf-gomod-cache:/go/pkg/mod \
        -v ocf-gobuild-cache:/root/.cache/go-build \
        -w /workspace \
        -e POSTGRES_DB=$POSTGRES_DB \
        -e POSTGRES_USER=$POSTGRES_USER \
        -e POSTGRES_PASSWORD=$POSTGRES_PASSWORD \
        -e POSTGRES_HOST=$POSTGRES_HOST \
        -e POSTGRES_PORT=$POSTGRES_PORT \
        -e POSTGRES_SSLMODE=$POSTGRES_SSLMODE \
        -e CASDOOR_ENDPOINT=$CASDOOR_ENDPOINT \
        golang:1.24 \
        sh -c "go test -v -tags integration -timeout=120s ./tests/auth/... 2>&1 | tee auth_tests.log"
    - cat auth_tests.log | go-junit-report -set-exit-code > auth_report.xml

  after_script:
    - docker compose -p ${COMPOSE_PROJECT:-ocf-test-cleanup} -f docker-compose.test.yml down -v --remove-orphans || true

  artifacts:
    reports:
      junit: auth_report.xml
    paths:
      - auth_report.xml
      - auth_tests.log
    expire_in: 1 week

  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"  # Manual trigger

# ============================================================================
# Build Stage
# ============================================================================

# Build Docker image and push to registry
# Only runs when version tags are pushed (triggered by check:version job)
# Tags image with both the version number and 'latest'
build-docker:
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - echo $token_jwt_key | base64 -d > ./token_jwt_key.pem

